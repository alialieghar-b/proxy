name: 🚀 API‑Based Proxy Worker (no git operations)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: proxy-worker
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  worker:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install requests cryptography

      - name: 🚀 Run API worker
        env:
          GITHUB_REPO: ${{ vars.GITHUB_REPO || 'alialieghar-b/proxy' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          BRANCH: relay
        run: python3 github_api_worker.py 2>&1
