name: 🔁 Proxy Worker (always‑on)

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours
  workflow_dispatch:

concurrency:
  group: proxy-worker
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  worker:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🔁 Proxy loop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          echo "⏳ Sleeping 5s so you can read logs..."
          sleep 5

          echo "Worker started at $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo "Will run for up to 350 minutes..."

          while [ $SECONDS -lt 21000 ]; do

            # ★ PULL latest changes from remote ★
            git pull --rebase origin main

            # If no queue file or empty, wait and retry
            if [ ! -f queue.jsonl ] || [ ! -s queue.jsonl ]; then
              sleep 5
              continue
            fi

            # Read the first line
            LINE=$(head -n 1 queue.jsonl)
            if [ -z "$LINE" ]; then
              sleep 5
              continue
            fi

            REQ_ID=$(echo "$LINE" | jq -r '.id')
            REQ_URL=$(echo "$LINE" | jq -r '.url')
            REQ_METHOD=$(echo "$LINE" | jq -r '.method // "GET"')

            echo "==> Processing $REQ_ID: $REQ_METHOD $REQ_URL"
            sleep 1

            # Process request in a subshell so a single error doesn't crash the loop
            (
              set -euo pipefail

              # Fetch the URL, following redirects (HTTP → HTTPS)
              HTTP_CODE=$(curl -s -o resp.tmp -w "%{http_code}" \
                -D resp_headers.txt \
                -L \
                --max-time 30 \
                "$REQ_URL" || echo "000")

              if [ "$HTTP_CODE" = "000" ]; then
                echo "!! Fetch failed for $REQ_ID"
                jq -n \
                  --arg status "502" \
                  --arg body "" \
                  --arg error "curl fetch failed" \
                  '{status: $status|tonumber, body_base64: $body, headers: {}, error: $error}' \
                  > "response_${REQ_ID}.json"
              else
                BODY_B64=$(base64 -w0 resp.tmp)

                # Build headers JSON using the external Python script
                HEADERS_JSON=$(python3 parse_headers.py)

                jq -n \
                  --arg status "$HTTP_CODE" \
                  --arg body "$BODY_B64" \
                  --argjson headers "$HEADERS_JSON" \
                  '{status: $status|tonumber, body_base64: $body, headers: $headers}' \
                  > "response_${REQ_ID}.json"
              fi

              # Remove the processed line from queue
              tail -n +2 queue.jsonl > queue_temp && mv queue_temp queue.jsonl

              # Stage and commit
              git add "response_${REQ_ID}.json" queue.jsonl

              if ! git diff --cached --quiet; then
                git commit -m "Processed $REQ_ID"
                git pull --rebase
                git push
                echo "--> Response committed for $REQ_ID"
              else
                echo "No changes to commit"
              fi
            ) || echo "!! Request $REQ_ID failed, but worker continues"

            sleep 2
          done

          echo "Worker loop finished (time limit reached). Exiting cleanly."
